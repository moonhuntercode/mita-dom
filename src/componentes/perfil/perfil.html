<div class="perfil-optimizado">
    <h2>Perfil de Usuario Remoto</h2>
    <div id="perfil-estado">
        <!-- Skeleton o loader -->
        <p class="loader">Cargando datos desde la API...</p>
    </div>
    
    <div id="perfil-contenido" style="display: none;">
        <p><strong>Nombre:</strong> <span id="perfil-nombre"></span></p>
        <p><strong>Email:</strong> <span id="perfil-email"></span></p>
    </div>

    <div id="perfil-error" style="display: none; color: #ff5252;">
        <p>Error al cargar el perfil.</p>
    </div>
</div>
